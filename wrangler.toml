"$schema" = "./node_modules/wrangler/config-schema.json"
name = "pjimenezdev"
main = ".open-next/worker.js"
compatibility_date = "2025-06-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[vars]
AI_PROVIDER = "deepseek"

# Per-IP limit shared by /api/concierge and /api/scope (LLM + email calls).
[[ratelimits]]
name = "AI_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 12, period = 60 }
